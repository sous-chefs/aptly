---
driver:
  name: vagrant

provisioner:
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  install_strategy: once
  deprecations_as_errors: true
  multiple_converge: 2

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
  - name: ubuntu-24.04
  - name: debian-12
  - name: debian-13

suites:
  - name: default
    verifier:
      inspec_tests:
        - test/integration/default
    run_list:
      - recipe[test::setup]
      - recipe[test::default]
